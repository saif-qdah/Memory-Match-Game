<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة تدريب الذاكرة الاحترافية 🧠</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #e74c3c, #2c5364);
            color: red;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        h1 { margin-bottom: 10px; font-size: 2rem; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        /* لوحة البيانات */
        .stats-container {
            display: flex;
            gap: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 1.1rem;
        }
        .highlight { color: #00ffcc; font-weight: bold; }

        /* شبكة اللعبة */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(4, 13vw);
            grid-template-rows: repeat(4, 13vw);
            gap: 12px;
            max-width: 500px;
            max-height: 500px;
            width: 100%;
            height: 100%;
        }
        @media (min-width: 600px) {
            .game-grid { grid-template-columns: repeat(4, 100px); grid-template-rows: repeat(4, 100px); }
        }

        /* تأثيرات الـ 3D للكروت */
        .card {
            background-color: transparent;
            perspective: 1000px;
            cursor: pointer;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            border-radius: 8px;
        }
        /* لما يلف الكرت */
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card.matched .card-inner { transform: rotateY(180deg); opacity: 0.6; cursor: default; }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 2rem;
        }
        /* ظهر الكرت (المغطي) */
        .card-front {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            border: 2px solid rgba(255,255,255,0.2);
        }
        /* وجه الكرت (الأيقونة) */
        .card-back {
            background-color: #ffffff;
            transform: rotateY(180deg);
            border: 2px solid #11998e;
        }

        button {
            margin-top: 20px;
            padding: 12px 24px;
            font-size: 1rem;
            background-color: #ff007f;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.4);
            transition: 0.2s;
        }
        button:hover { transform: scale(1.05); background-color: #ff3399; }
    </style>
</head>
<body>

    <h1>لعبة تطابق الذاكرة 🧠</h1>
    
    <div class="stats-container">
        <div>الوقت: <span id="timer" class="highlight">00:00</span></div>
        <div>المحاولات: <span id="moves" class="highlight">0</span></div>
        <div>أفضل وقت: <span id="best-time" class="highlight">--:--</span></div>
    </div>

    <div class="game-grid" id="grid"></div>

    <button onclick="resetGame()">إعادة تشغيل 🔄</button>

    <script src="script.js"></script>
</body>
</html>
